services:
  - type: web
    name: captrack
    env: node
    region: oregon
    buildCommand: npm install --prefix backend && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: INSTITUTION_MASTER_KEY
        sync: false
